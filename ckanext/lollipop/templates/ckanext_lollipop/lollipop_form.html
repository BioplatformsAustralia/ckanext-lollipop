{% import 'macros/form.html' as form %}

FIXME determine action

<form class="dataset-form form-horizontal" method="post" action="{{ h.url_for('lollipop.lollipop_process') }}" data-module="basic-form" id="lollipop-form">
<input id="field-return-to" type="hidden" name="return_to" value="{{ h.current_url() }}">

{% if g.recaptcha_publickey %}
  {% snippet "snippets/recaptcha.html", public_key=g.recaptcha_publickey, callback="onRecaptchaSuccess" %}
{% endif %}


<div class="form-actions">
  <div class="btn-toolbar pull-right">
    <button class="btn btn-primary" name="continue" id="lollipop-continue-button" type="submit">
       <i class="fa fa-plus-circle"></i>
       {% block continue_text %}{{ _('Continue') }}{% endblock %}
    </button>
  </div>
</div>
</form>

<script>
  function onRecaptchaSuccess(token) {
    document.getElementById("lollipop-continue-button").click();
  }
</script>
